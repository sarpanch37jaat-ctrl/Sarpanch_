minecraft_version=1.21.11
yarn_mappings=1.21.11+build.1
loader_version=0.16.10
loom_version=1.9-SNAPSHOT

# Fabric API
fabric_version=0.116.5+1.21.11

# Mod Properties
mod_version=1.0.0
maven_group=com.renderguard
archives_base_name=renderguard
